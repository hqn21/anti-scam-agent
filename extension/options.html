<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti-Scam Agent 設定</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #f9f9f9;
      margin: 0;
      padding: 24px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 20px 0;
      color: #1a1a1a;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 360px;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4a90e2;
      box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
    }

    .hint {
      margin: 6px 0 0 0;
      font-size: 12px;
      color: #777;
    }

    button#save {
      padding: 7px 18px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    button#save:hover {
      background: #357abd;
    }

    #status {
      margin-left: 10px;
      font-size: 13px;
      color: #2a7a2a;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h1>Anti-Scam Agent 設定</h1>

  <div class="field">
    <label for="apiBase">API 位址</label>
    <input id="apiBase" type="text" placeholder="http://localhost:8000">
    <p class="hint">預設值為 <code>http://localhost:8000</code>，必須指向本機執行中的 Anti-Scam Agent 伺服器。</p>
  </div>

  <div>
    <button id="save">儲存</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
